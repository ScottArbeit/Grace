
name: Agent Task
description: Coordinate a Grace implementation task for a human or AI agent.
labels:
  - ready-for-agent
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should change, in one concrete slice?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and evidence
      description: Include relevant logs, files, symptoms, prior PRs, or decisions. Do not paste secrets.
    validations:
      required: true
  - type: textarea
    id: decision-closure
    attributes:
      label: Decision closure and contract propagation
      description: Required for product, contract, durable, public, or cross-project work. Use N/A only with a reason.
      placeholder: |
        - Product decisions accepted or assumed:
          - ...
        - Product decisions deferred or waived:
          - ...
        - Supported inputs / rejected inputs / informational inputs:
          - ...
        - Contract propagation map:
          - shared DTOs/parameters/events/persisted state:
          - HTTP route/authorization/error shape:
          - CLI JSON/stdout/stderr/help:
          - SDK/facade client:
          - OpenAPI/generated clients:
          - events/webhooks/SignalR/watch/search/projections:
          - docs/ADRs/agent guidance:
    validations:
      required: true

  - type: textarea
    id: owned-paths
    attributes:
      label: Owned paths
      description: Files or directories this task may edit.
      placeholder: |
        - src/Grace.Server/...
        - src/Grace.Server.Tests/...
    validations:
      required: true
  - type: textarea
    id: forbidden-paths
    attributes:
      label: Forbidden or sensitive paths
      description: Paths the agent must not edit unless the issue is updated.
      placeholder: |
        - .github/workflows/*
        - src/Grace.Actors/*
        - src/Grace.Shared/*
    validations:
      required: true
  - type: dropdown
    id: risk-surfaces
    attributes:
      label: Risk surfaces
      description: Select every area this task touches. Choose no special risk only when the other options do not apply.
      multiple: true
      options:
        - Proof/test work
        - DTO or contract work
        - Auth, authorization, tenant, or secret handling
        - Storage, Cosmos DB, Service Bus, Redis, or Aspire
        - Storage or materialization work
        - CLI public contract
        - Server or API contract
        - Orleans actor behavior
        - Async or runtime behavior
        - Algorithm behavior
        - History or traversal behavior
        - SDK or client contract
        - Deployment, Docker, or GitHub Actions
        - Final audit or docs evidence
        - Docs or workflow
        - No special risk surface expected
    validations:
      required: true
  - type: textarea
    id: minimum-detail-gate
    attributes:
      label: Minimum detail gate
      description: Required for implementation tasks before assignment or claim. Use N/A only with a reason.
      placeholder: |
        - Invariant tuple:
          - actor/route/command/DTO/state:
          - identity dimensions:
          - durable source of truth:
        - Forbidden implementation shapes:
          - ...
        - Expected tests:
          - positive:
          - negative:
          - regression:
          - boundary:
        - High-risk adversarial examples:
          - ...
        - Selected risk-surface traps:
          - proof/test:
          - DTO/contract:
          - CLI:
          - server/API:
          - storage/materialization:
          - async/runtime:
          - algorithm:
          - history/traversal:
          - stale-authority / revalidation:
          - final audit/docs:
        - Explicit N/A waivers with reasons:
          - ...
    validations:
      required: true
  - type: dropdown
    id: validation-profile
    attributes:
      label: Validation profile
      description: Choose the profile from docs/Development process.md that best matches this task.
      options:
        - docs-only
        - domain-contract
        - cli-command
        - server-api
        - actor-workflow
        - sdk-client
        - deployment-runtime
    validations:
      required: true
  - type: textarea
    id: public-behavior
    attributes:
      label: Public behavior under test
      description: Name the stable boundary, behavior, invariant, transition, or docs-only validation target.
      placeholder: |
        - Boundary:
        - Behavior:
        - RED evidence expected:
    validations:
      required: true
  - type: dropdown
    id: conflict-score
    attributes:
      label: Path lease conflict score
      description: Choose the score and explain the reason below.
      options:
        - 0 - leaf code or docs
        - 1 - same project or fixture area
        - 2 - shared contracts or shared repo structure
        - 3 - high-risk operational surface
    validations:
      required: true
  - type: textarea
    id: conflict-score-reason
    attributes:
      label: Conflict score reason
      description: Explain why this path lease can run alone or in parallel, including expected overlap.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Expected validation
      placeholder: |
        - focused test command
        - fast validation expectation
        - full validation expectation, if needed
        - manual validation, if any
    validations:
      required: true
  - type: textarea
    id: docs-impact
    attributes:
      label: Docs impact
      description: State whether README, CONTRIBUTING, AGENTS, runbook, or product docs updates are expected.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: |
        - behavior changed
        - tests added or updated
        - PR opened and linked
        - residual risks documented
    validations:
      required: true
