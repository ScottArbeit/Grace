name: .NET Restore / Build / Test

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    #runs-on: arc-runner-set
    runs-on: ubuntu-latest
    env:
      GraceBuildKind: ci
      GraceBuildNumber: ${{ github.run_number }}
      GraceSourceRevisionId: ${{ github.sha }}

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install .NET Aspire workload
      run: dotnet workload install aspire
    - name: Restore dependencies
      run: dotnet restore Grace.slnx --tl:on
      working-directory: src
    - name: Build
      run: dotnet build Grace.slnx --no-restore -c Release --tl:on
      working-directory: src
#    - name: Test
#      run: dotnet test Grace.sln --no-build --verbosity normal --tl:on
#      working-directory: src
