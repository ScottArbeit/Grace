CacheRegistrationRequest:
  description: Request body used by an approved Grace Cache service to register its endpoint and requested boundary.
  type: object
  properties:
    Class:
      type: string
      example: CacheRegistrationRequest
    Endpoint:
      type: string
      format: uri
      example: https://cache.example.net/grace
    RequestedScopes:
      type: array
      items:
        type: string
      example: [repository:owner/org/repo]
    RequestedCapabilities:
      type: array
      items:
        type: string
      example: [read-through, prefetch]
    RequestedExecutionModes:
      type: array
      items:
        $ref: './Materialization.Components.OpenAPI.yaml#/MaterializationExecutionMode'
      example: [cachePreferred, cacheRequired]
  required: [Class, Endpoint, RequestedScopes, RequestedCapabilities, RequestedExecutionModes]
CacheRegistrationRefreshRequest:
  description: Request body used by an approved Grace Cache service to refresh its current registration.
  type: object
  properties:
    Class:
      type: string
      example: CacheRegistrationRefreshRequest
  required: [Class]
CacheRegistrationRefreshStatus:
  description: Result classification for a Cache registration or refresh operation.
  type: string
  enum: [refreshed, refreshNotDue, expired, notFound]
  x-enumNames: [Refreshed, RefreshNotDue, Expired, NotFound]
  example: refreshed
CacheRegistration:
  description: Server-owned active registration record for an approved Grace Cache service.
  type: object
  properties:
    Class:
      type: string
      example: CacheRegistration
    ServicePrincipalId:
      type: string
      example: cache-service-client
    Endpoint:
      type: string
      format: uri
      example: https://cache.example.net/grace
    ApprovedScopes:
      type: array
      items:
        type: string
    ApprovedCapabilities:
      type: array
      items:
        type: string
    ApprovedExecutionModes:
      type: array
      items:
        $ref: './Materialization.Components.OpenAPI.yaml#/MaterializationExecutionMode'
    RegisteredAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    LastRefreshedAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    RefreshAfter:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    ExpiresAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    ReadThroughEnabled:
      type: boolean
    PrefetchEnabled:
      type: boolean
  required:
    - Class
    - ServicePrincipalId
    - Endpoint
    - ApprovedScopes
    - ApprovedCapabilities
    - ApprovedExecutionModes
    - RegisteredAt
    - LastRefreshedAt
    - RefreshAfter
    - ExpiresAt
    - ReadThroughEnabled
    - PrefetchEnabled
CacheRegistrationResult:
  description: Result returned by Cache registration and refresh routes.
  type: object
  properties:
    Class:
      type: string
      example: CacheRegistrationResult
    Status:
      $ref: '#/CacheRegistrationRefreshStatus'
    Registration:
      $ref: '#/CacheRegistration'
      nullable: true
    Message:
      type: string
      example: Cache registration is current.
  required: [Class, Status, Message]
CacheRegistrationReturnValue:
  description: Grace response envelope whose ReturnValue contains a Cache registration result.
  type: object
  properties:
    ReturnValue:
      $ref: '#/CacheRegistrationResult'
    EventTime:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    CorrelationId:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/CorrelationId'
    Properties:
      type: object
      additionalProperties:
        type: string
  required: [ReturnValue, EventTime, CorrelationId, Properties]
ArtifactGrantValidationKey:
  description: Public P-256 validation key used by Grace Cache to verify signed artifact grants.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactGrantValidationKey
    KeyId:
      type: string
      example: agk-example
    Algorithm:
      type: string
      enum: [ES256]
      example: ES256
    CreatedAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    NotBefore:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    ExpiresAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    PublicKeyX:
      type: string
      description: Base64url-encoded P-256 X coordinate.
    PublicKeyY:
      type: string
      description: Base64url-encoded P-256 Y coordinate.
  required: [Class, KeyId, Algorithm, CreatedAt, NotBefore, ExpiresAt, PublicKeyX, PublicKeyY]
ArtifactGrantValidationKeySet:
  description: Validation-key publication for local artifact grant verification by Grace Cache.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactGrantValidationKeySet
    Issuer:
      type: string
      example: Grace.Server.ArtifactGrant.v1
    PublishedAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    CacheTtl:
      type: string
      description: Validation-key cache lifetime serialized as a NodaTime duration.
      example: PT15M
    Keys:
      type: array
      items:
        $ref: '#/ArtifactGrantValidationKey'
  required: [Class, Issuer, PublishedAt, CacheTtl, Keys]
ArtifactGrantValidationKeySetResponse:
  description: OK
  content:
    application/json:
      schema:
        $ref: '#/ArtifactGrantValidationKeySet'
CacheRegistrationResponse:
  description: OK
  content:
    application/json:
      schema:
        $ref: '#/CacheRegistrationReturnValue'
