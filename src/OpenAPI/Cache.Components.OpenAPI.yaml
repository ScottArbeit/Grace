CacheBoundaryKind:
  type: string
  enum: [owner, organization]
  x-enumNames: [Owner, Organization]
CacheHealthStatus:
  type: string
  enum: [healthy, unhealthy]
  x-enumNames: [Healthy, Unhealthy]
CacheIdentityPublicKey:
  description: Canonical P-256 public key for a Cache identity. Private key material is never accepted or returned.
  type: object
  properties:
    Class: { type: string, example: CacheIdentityPublicKey }
    Algorithm: { type: string, enum: [ES256] }
    Curve: { type: string, enum: [P-256] }
    PublicKeyX: { type: string }
    PublicKeyY: { type: string }
  required: [Class, Algorithm, Curve, PublicKeyX, PublicKeyY]
CacheRepositoryScope:
  description: Explicit durable repository assignment with its organization needed for authoritative lookup.
  type: object
  properties:
    Class: { type: string, example: CacheRepositoryScope }
    OrganizationId: { type: string, format: uuid }
    RepositoryId: { type: string, format: uuid }
  required: [Class, OrganizationId, RepositoryId]
CacheRequestProofPayload:
  description: Canonical Cache proof binding the cache id, operation, canonical request digest, and Unix-millisecond timestamp.
  type: object
  properties:
    Class: { type: string, example: CacheRequestProofPayload }
    CacheId: { type: string, format: uuid }
    Operation: { type: string }
    RequestDigest: { type: string }
    IssuedAt: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant' }
  required: [Class, CacheId, Operation, RequestDigest, IssuedAt]
SignedCacheRequestProof:
  type: object
  properties:
    Class: { type: string, example: SignedCacheRequestProof }
    Payload: { $ref: '#/CacheRequestProofPayload' }
    Signature: { type: string }
  required: [Class, Payload, Signature]
CacheEnrollmentRequest:
  description: Administrator-authenticated enrollment for exactly one Owner or Organization and explicit repositories within it.
  type: object
  properties:
    Class: { type: string, example: CacheEnrollmentRequest }
    DisplayName: { type: string }
    BoundaryKind: { $ref: '#/CacheBoundaryKind' }
    OwnerId: { type: string, format: uuid }
    OrganizationId: { type: string, format: uuid, nullable: true }
    RepositoryScopes:
      type: array
      minItems: 1
      items: { $ref: '#/CacheRepositoryScope' }
    PublicKey: { $ref: '#/CacheIdentityPublicKey' }
    Endpoint: { type: string, format: uri }
    AllowHttpEndpoint:
      type: boolean
      description: Explicit administrator approval for this exact Endpoint to use HTTP instead of the HTTPS default.
    Health: { $ref: '#/CacheHealthStatus' }
    SoftwareVersion: { type: string }
    ProtocolVersion: { type: string }
    PrefetchSupported: { type: boolean }
  required: [Class, DisplayName, BoundaryKind, OwnerId, RepositoryScopes, PublicKey, Endpoint, AllowHttpEndpoint, Health, SoftwareVersion, ProtocolVersion, PrefetchSupported]
CacheRegistrationRefreshRequest:
  description: Cache-authenticated refresh that may update operational facts only.
  type: object
  properties:
    Class: { type: string, example: CacheRegistrationRefreshRequest }
    CacheId: { type: string, format: uuid }
    Endpoint: { type: string, format: uri }
    Health: { $ref: '#/CacheHealthStatus' }
    SoftwareVersion: { type: string }
    ProtocolVersion: { type: string }
    PrefetchSupported: { type: boolean }
    ObservedAt: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant' }
    Proof: { $ref: '#/SignedCacheRequestProof' }
  required: [Class, CacheId, Endpoint, Health, SoftwareVersion, ProtocolVersion, PrefetchSupported, ObservedAt, Proof]
CacheRepositoryAssignmentRequest:
  type: object
  properties:
    Class: { type: string, example: CacheRepositoryAssignmentRequest }
    CacheId: { type: string, format: uuid }
    RepositoryScopes:
      type: array
      minItems: 1
      items: { $ref: '#/CacheRepositoryScope' }
  required: [Class, CacheId, RepositoryScopes]
CacheRevocationRequest:
  type: object
  properties:
    Class: { type: string, example: CacheRevocationRequest }
    CacheId: { type: string, format: uuid }
  required: [Class, CacheId]
CacheKeyRotationRequest:
  type: object
  properties:
    Class: { type: string, example: CacheKeyRotationRequest }
    CacheId: { type: string, format: uuid }
    OperationId: { type: string, format: uuid }
    NewPublicKey: { $ref: '#/CacheIdentityPublicKey' }
    Proof: { $ref: '#/SignedCacheRequestProof' }
  required: [Class, CacheId, OperationId, NewPublicKey, Proof]
CacheKeyRotationOutcomeRequest:
  type: object
  properties:
    Class: { type: string, example: CacheKeyRotationOutcomeRequest }
    CacheId: { type: string, format: uuid }
    OperationId: { type: string, format: uuid }
    Proof: { $ref: '#/SignedCacheRequestProof' }
  required: [Class, CacheId, OperationId, Proof]
CacheKeyRotationCompletionRequest:
  type: object
  properties:
    Class: { type: string, example: CacheKeyRotationCompletionRequest }
    CacheId: { type: string, format: uuid }
    OperationId: { type: string, format: uuid }
    Proof: { $ref: '#/SignedCacheRequestProof' }
  required: [Class, CacheId, OperationId, Proof]
CacheRegistrationRefreshStatus:
  description: Result classification for Cache enrollment and lifecycle operations.
  type: string
  enum: [enrolled, refreshed, refreshNotDue, expired, notFound, revoked, updated, rotated, endpointMismatch]
  x-enumNames: [Enrolled, Refreshed, RefreshNotDue, Expired, NotFound, Revoked, Updated, Rotated, EndpointMismatch]
  example: enrolled
CacheRegistration:
  description: Durable Cache registration with immutable CacheId, explicit repository assignments, and no private key material.
  type: object
  properties:
    Class: { type: string, example: CacheRegistration }
    CacheId: { type: string, format: uuid }
    DisplayName: { type: string }
    BoundaryKind: { $ref: '#/CacheBoundaryKind' }
    OwnerId: { type: string, format: uuid }
    OrganizationId: { type: string, format: uuid, nullable: true }
    RepositoryScopes: { type: array, items: { $ref: '#/CacheRepositoryScope' } }
    PublicKey: { $ref: '#/CacheIdentityPublicKey' }
    Endpoint: { type: string, format: uri }
    AllowHttpEndpoint:
      type: boolean
      description: Persisted administrator approval for this exact Endpoint to use HTTP instead of HTTPS.
    Health: { $ref: '#/CacheHealthStatus' }
    SoftwareVersion: { type: string }
    ProtocolVersion: { type: string }
    PrefetchSupported: { type: boolean }
    EnrolledBy: { type: string }
    EnrolledAt: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant' }
    LastRefreshedAt: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant' }
    RefreshAfter: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant' }
    ExpiresAt: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant' }
    RotationDueAt: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant' }
    RevokedAt: { $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant', nullable: true }
  required: [Class, CacheId, DisplayName, BoundaryKind, OwnerId, RepositoryScopes, PublicKey, Endpoint, AllowHttpEndpoint, Health, SoftwareVersion, ProtocolVersion, PrefetchSupported, EnrolledBy, EnrolledAt, LastRefreshedAt, RefreshAfter, ExpiresAt, RotationDueAt]
CacheRegistrationResult:
  description: Result returned by Cache registration and refresh routes.
  type: object
  properties:
    Class:
      type: string
      example: CacheRegistrationResult
    Status:
      $ref: '#/CacheRegistrationRefreshStatus'
    Registration:
      $ref: '#/CacheRegistration'
      nullable: true
    Message:
      type: string
      example: Cache registration is current.
  required: [Class, Status, Message]
CacheRegistrationReturnValue:
  description: Grace response envelope whose ReturnValue contains a Cache registration result.
  type: object
  properties:
    ReturnValue:
      $ref: '#/CacheRegistrationResult'
    EventTime:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    CorrelationId:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/CorrelationId'
    Properties:
      type: object
      additionalProperties:
        type: string
  required: [ReturnValue, EventTime, CorrelationId, Properties]
ArtifactGrantValidationKey:
  description: Public P-256 validation key used by Grace Cache to verify signed artifact grants.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactGrantValidationKey
    KeyId:
      type: string
      example: agk-example
    Algorithm:
      type: string
      enum: [ES256]
      example: ES256
    CreatedAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    NotBefore:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    ExpiresAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    PublicKeyX:
      type: string
      description: Base64url-encoded P-256 X coordinate.
    PublicKeyY:
      type: string
      description: Base64url-encoded P-256 Y coordinate.
  required: [Class, KeyId, Algorithm, CreatedAt, NotBefore, ExpiresAt, PublicKeyX, PublicKeyY]
ArtifactGrantValidationKeySet:
  description: Validation-key publication for local artifact grant verification by Grace Cache.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactGrantValidationKeySet
    Issuer:
      type: string
      example: Grace.Server.ArtifactGrant.v1
    PublishedAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    CacheTtl:
      type: string
      description: Validation-key cache lifetime serialized as a NodaTime duration.
      example: PT15M
    Keys:
      type: array
      items:
        $ref: '#/ArtifactGrantValidationKey'
  required: [Class, Issuer, PublishedAt, CacheTtl, Keys]
ArtifactGrantRequesterPrincipalType:
  description: Authenticated requester category bound into a V1 artifact grant.
  type: string
  enum: [user]
  x-enumNames: [User]
  example: user
ArtifactGrantHolderPublicKey:
  description: Canonical public half of the client's ephemeral P-256 holder key.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactGrantHolderPublicKey
    Algorithm:
      type: string
      enum: [ES256]
    Curve:
      type: string
      enum: [P-256]
    PublicKeyX:
      type: string
      description: Base64url-encoded 32-byte P-256 X coordinate.
    PublicKeyY:
      type: string
      description: Base64url-encoded 32-byte P-256 Y coordinate.
  required: [Class, Algorithm, Curve, PublicKeyX, PublicKeyY]
ArtifactGrantHeader:
  description: Canonical header for one signed artifact grant.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactGrantHeader
    Algorithm:
      type: string
      enum: [ES256]
    KeyId:
      type: string
  required: [Class, Algorithm, KeyId]
ArtifactGrantPayload:
  description: Requester-, holder-, cache-, root-, mode-, and artifact-bound authorization payload.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactGrantPayload
    Issuer:
      type: string
      example: Grace.Server.ArtifactGrant.v1
    RequesterPrincipalType:
      $ref: '#/ArtifactGrantRequesterPrincipalType'
    RequesterPrincipalId:
      type: string
      description: Stable authenticated grace_user_id supplied by Grace Server.
    HolderKeyThumbprint:
      type: string
      description: Base64url SHA-256 thumbprint of the canonical ephemeral holder public key.
    CacheId:
      type: string
    CacheEndpoint:
      type: string
      format: uri
      description: Exact selected Cache endpoint covered by this signature.
    TargetRootDirectoryVersionId:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/DirectoryVersionId'
    ExecutionMode:
      $ref: './Materialization.Components.OpenAPI.yaml#/MaterializationExecutionMode'
    ArtifactIdentities:
      type: array
      minItems: 1
      items:
        type: string
    IssuedAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    NotBefore:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    ExpiresAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
  required:
    - Class
    - Issuer
    - RequesterPrincipalType
    - RequesterPrincipalId
    - HolderKeyThumbprint
    - CacheId
    - CacheEndpoint
    - TargetRootDirectoryVersionId
    - ExecutionMode
    - ArtifactIdentities
    - IssuedAt
    - NotBefore
    - ExpiresAt
SignedArtifactGrant:
  description: ES256 artifact grant envelope returned only for non-Direct materialization.
  type: object
  properties:
    Class:
      type: string
      example: SignedArtifactGrant
    Header:
      $ref: '#/ArtifactGrantHeader'
    Payload:
      $ref: '#/ArtifactGrantPayload'
    Signature:
      type: string
      description: Base64url ECDSA signature over the canonical header and payload.
  required: [Class, Header, Payload, Signature]
ArtifactRequestProofPayload:
  description: Canonical statement binding one short-lived holder proof to an exact artifact request.
  type: object
  properties:
    Class:
      type: string
      example: ArtifactRequestProofPayload
    GrantDigest:
      type: string
      description: Base64url SHA-256 digest of the complete signed grant envelope.
    HttpMethod:
      type: string
      example: GET
    NormalizedRoute:
      type: string
      example: /cache/artifacts/GraceZipFiles/root.zip
    ArtifactIdentity:
      type: string
    IssuedAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    ExpiresAt:
      $ref: './Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
  required: [Class, GrantDigest, HttpMethod, NormalizedRoute, ArtifactIdentity, IssuedAt, ExpiresAt]
SignedArtifactRequestProof:
  description: Request-specific proof signed by the private half of the grant-bound ephemeral holder key.
  type: object
  properties:
    Class:
      type: string
      example: SignedArtifactRequestProof
    HolderPublicKey:
      $ref: '#/ArtifactGrantHolderPublicKey'
    Payload:
      $ref: '#/ArtifactRequestProofPayload'
    Signature:
      type: string
      description: Base64url ECDSA signature over the canonical proof payload.
  required: [Class, HolderPublicKey, Payload, Signature]
ArtifactGrantValidationKeySetResponse:
  description: OK
  content:
    application/json:
      schema:
        $ref: '#/ArtifactGrantValidationKeySet'
CacheRegistrationResponse:
  description: OK
  content:
    application/json:
      schema:
        $ref: '#/CacheRegistrationReturnValue'
