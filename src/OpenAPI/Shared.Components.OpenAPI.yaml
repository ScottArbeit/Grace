components:
  schemas:
    Instant:
      type: string
      format: date-time
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence of the problem.
      required:
        - type
        - title
        - status
        - detail
        - instance
    BranchId:
      type: string
      format: uuid
      example: de7bf47d-23ae-4599-af68-68a317ea390d
    BranchName:
      type: string
      example: MyBranch
    CorrelationId:
      type: string
      description: >-
        Body DTO correlation id copied into Grace command/event metadata after request parsing. This field is distinct
        from the X-Correlation-Id transport header, which correlates the HTTP request/response exchange.
      example: cli-20260604T181500Z-0001
    ContainerName:
      type: string
      description: The name of the container must be a valid Grace name. (See the Grace documentation for more information.)
    DirectoryId:
      type: string
      format: uuid
      example: 33a4e36b-828f-4fae-9343-50b6560dc842
    DirectoryVersionId:
      type: string
      format: uuid
      example: 33a4e36b-828f-4fae-9343-50b6560dc842
    FilePath:
      type: string
    GraceIgnoreEntry:
      type: string
    OrganizationId:
      type: string
      format: uuid
      example: e35d64a9-b990-44f5-bf02-32ad7d15630c
    OrganizationName:
      type: string
    OwnerId:
      type: string
      format: uuid
      example: 9dd5f81f-dc43-4839-9173-85d09394f30f
    OwnerName:
      type: string
    ReferenceId:
      type: string
      format: uuid
      example: c8f9bac8-d489-46c7-917f-b36b7d9efa9a
    ReferenceName:
      type: string
    ReferenceText:
      type: string
    RepositoryId:
      type: string
      format: uuid
      example: ab6f35ef-6e01-440b-8f9b-c343a5272095
    RepositoryName:
      type: string
    RelativePath:
      type: string
    Sha256Hash:
      type: string
      description: Lowercase 64-character SHA-256 version hash persisted on version DTOs.
      pattern: '^[a-f0-9]{64}$'
      example: 805331a98813206270e35564769e8bb59eea02aeb7b27c7d6c63e625e1857243
    Sha256HashReferenceCompatibility:
      type: string
      description: Empty value or lowercase 64-character SHA-256 hash for legacy or default reference DTOs.
      pattern: '^$|^[a-f0-9]{64}$'
      example: 805331a98813206270e35564769e8bb59eea02aeb7b27c7d6c63e625e1857243
    Sha256HashLookupSentinelCompatibility:
      type: string
      description: Empty value only for the DirectoryVersion.Default no-match sentinel, or lowercase 64-character SHA-256 hash.
      pattern: '^$|^[a-f0-9]{64}$'
      example: 805331a98813206270e35564769e8bb59eea02aeb7b27c7d6c63e625e1857243
    Sha256HashPrefix:
      type: string
      description: Lowercase or uppercase 2- to 64-character SHA-256 version hash prefix.
      pattern: '^[A-Fa-f0-9]{2,64}$'
      example: 805331a98813
    Sha256HashOptionalPrefix:
      type: string
      description: Empty value or lowercase or uppercase 2- to 64-character SHA-256 version hash prefix.
      pattern: '^$|^[A-Fa-f0-9]{2,64}$'
      example: 805331a98813
    Blake3Hash:
      type: string
      description: Lowercase 64-character BLAKE3 version hash persisted on new version graph DTOs.
      pattern: '^[a-f0-9]{64}$'
      example: 9a35d91b2f631be9025de753139b88f7b1e71385c412bc3986ff2f38f230841d
    Blake3HashCompatibility:
      type: string
      nullable: true
      description: Empty value, null, or lowercase 64-character BLAKE3 version hash for legacy version DTOs.
      pattern: '^$|^[a-f0-9]{64}$'
      example: 9a35d91b2f631be9025de753139b88f7b1e71385c412bc3986ff2f38f230841d
    Blake3HashReferenceCompatibility:
      type: string
      description: Empty value or lowercase 64-character BLAKE3 hash for legacy reference DTOs.
      pattern: '^$|^[a-f0-9]{64}$'
      example: 9a35d91b2f631be9025de753139b88f7b1e71385c412bc3986ff2f38f230841d
    Blake3HashPrefix:
      type: string
      description: Lowercase or uppercase 2- to 64-character BLAKE3 version hash prefix used for version graph lookups.
      pattern: '^[A-Fa-f0-9]{2,64}$'
      example: 9a35d91b2f63
    Blake3HashOptionalPrefix:
      type: string
      description: Empty value or lowercase or uppercase 2- to 64-character BLAKE3 version hash prefix.
      pattern: '^$|^[A-Fa-f0-9]{2,64}$'
      example: 9a35d91b2f63
    StorageAccountName:
      type: string
    StorageConnectionString:
      type: string
    StorageContainerName:
      type: string
    UriWithSharedAccessSignature:
      type: string
    UserId:
      type: string

    OwnerType:
      type: string
      enum: [Public, Private]
      example: Public

    OrganizationType:
      type: string
      enum: [Public, Private]
      summary: The OrganizationType determines whether the Organization is visible to the public or not.
      description: The OrganizationType determines whether the Organization is visible to the public or not.
      example: Public

    SearchVisibility:
      type: string
      enum: [Visible, NotVisible]
      example: NotVisible

    ReferenceType:
      type: string
      enum: [promotion, commit, checkpoint, save, tag, external, rebase]
      example: commit
    
    CommonParameters:
      description: Common parameters that are used across (almost) every endpoint in Grace.
      type: object
      properties:
        CorrelationId:
          type: string
          description: >-
            Body DTO correlation id copied into Grace command/event metadata after request parsing. This field is
            distinct from the X-Correlation-Id transport header.
        Principal:
          type: string
          description: The entity on whose behalf the action is being performed.

    FileVersion:
      type: object
      properties:
        Class:
          type: string
        RelativePath:
          $ref: '#/components/schemas/RelativePath'
        Sha256Hash:
          $ref: '#/components/schemas/Sha256Hash'
        Blake3Hash:
          $ref: '#/components/schemas/Blake3HashCompatibility'
        IsBinary:
          type: boolean
        Size:
          type: integer
          format: int64
        CreatedAt:
          type: string
          format: date-time
        BlobUri:
          type: string
        ContentReference:
          $ref: 'Storage.Components.OpenAPI.yaml#/FileContentReference'
      example:
        Class: FileVersion
        RelativePath: src/App.fs
        Sha256Hash: 805331a98813206270e35564769e8bb59eea02aeb7b27c7d6c63e625e1857243
        Blake3Hash: 9a35d91b2f631be9025de753139b88f7b1e71385c412bc3986ff2f38f230841d
        IsBinary: false
        Size: 128
        CreatedAt: '2026-06-04T18:15:00Z'
        BlobUri: ''
        ContentReference:
          Class: FileContentReference
          ReferenceType: WholeFileContent
          Manifest: null

    DirectoryVersion:
      type: object
      properties:
        Class:
          type: string
        DirectoryVersionId:
          $ref: '#/components/schemas/DirectoryVersionId'
        OwnerId:
          $ref: '#/components/schemas/OwnerId'
        OrganizationId:
          $ref: '#/components/schemas/OrganizationId'
        RepositoryId:
          $ref: '#/components/schemas/RepositoryId'
        RelativePath:
          $ref: '#/components/schemas/RelativePath'
        Sha256Hash:
          $ref: '#/components/schemas/Sha256Hash'
        Blake3Hash:
          $ref: '#/components/schemas/Blake3HashCompatibility'
        Directories:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryVersionId'
        Files:
          type: array
          items:
            $ref: '#/components/schemas/FileVersion'
        Size:
          type: integer
          format: int64
        RecursiveSize:
          type: integer
          format: int64
        CreatedAt:
          type: string
          format: date-time
        HashesValidated:
          type: boolean
      example:
        Class: DirectoryVersion
        DirectoryVersionId: 33a4e36b-828f-4fae-9343-50b6560dc842
        OwnerId: 9dd5f81f-dc43-4839-9173-85d09394f30f
        OrganizationId: e35d64a9-b990-44f5-bf02-32ad7d15630c
        RepositoryId: ab6f35ef-6e01-440b-8f9b-c343a5272095
        RelativePath: src
        Sha256Hash: 805331a98813206270e35564769e8bb59eea02aeb7b27c7d6c63e625e1857243
        Blake3Hash: 9a35d91b2f631be9025de753139b88f7b1e71385c412bc3986ff2f38f230841d
        Directories: []
        Files: []
        Size: 0
        CreatedAt: '2026-06-04T18:15:00Z'
        HashesValidated: true

    EventMetadata:
      description: 
      type: object
      properties:
        Timestamp:
          type: string
          format: date-time
        CorrelationId:
          type: string
        Principal:
          type: string
        ClientType:
          $ref: '#/components/schemas/ClientType'
        Properties:
          type: object
          additionalProperties:
            type: string

    ClientType:
      description: >-
        The Grace client identity type/version recorded for diagnostics. Client identity headers are not authentication
        proof and must not be used as authorization evidence.
      type: string

    GraceReturnValue:
      type: object
      properties:
        ReturnValue:
          type: object
        EventTime:
          type: string
          format: date-time
        CorrelationId:
          type: string
        Properties:
          type: object
          additionalProperties:
            type: string

    GraceError:
      description: >-
        Grace domain error envelope returned by command handlers. Authentication challenges and framework authorization
        failures use their HTTP-specific response shapes instead of this domain error envelope.
      type: object
      properties:
        Error:
          type: string
          example: OwnerId is required.
        EventTime:
          type: string
          format: date-time
          example: '2026-06-04T18:15:00Z'
        CorrelationId:
          type: string
          example: cli-20260604T181500Z-0001
        Properties:
          type: object
          additionalProperties:
            type: string
      required:
        - Error
        - EventTime
        - CorrelationId
        - Properties
      example:
        Error: OwnerId is required.
        EventTime: '2026-06-04T18:15:00Z'
        CorrelationId: cli-20260604T181500Z-0001
        Properties:
          Path: /owner/get

    GraceResult:
      oneOf:
        - - $ref: '#/components/schemas/GraceReturnValue'
        - - $ref: '#/components/schemas/GraceError'

    FileSystemEntryType:
      type: string
      enum:
        - Directory
        - File

    DifferenceType:
      type: string
      enum:
        - Add
        - Change
        - Delete

    FileSystemDifference:
      type: object
      properties:
        DifferenceType:
          $ref: #/DifferenceType
        FileSystemEntryType:
          $ref: #/FileSystemEntryType
        RelativePath:
          $ref: #/RelativePath
      required:
        - DifferenceType
        - FileSystemEntryType
        - RelativePath

    FileDiff:
      type: object
      properties:
        RelativePath:
          $ref: #/RelativePath
        FileSha1:
          $ref: #/Sha256Hash
        CreatedAt1:
          $ref: #/Instant
        FileSha2:
          $ref: #/Sha256Hash
        CreatedAt2:
          $ref: #/Instant
        IsBinary:
          type: boolean
        InlineDiff:
          type: array
          items:
            type: array
            items:
              $ref: #/DiffPiece
        SideBySideOld:
          type: array
          items:
            type: array
            items:
              $ref: #/DiffPiece
        SideBySideNew:
          type: array
          items:
            type: array
            items:
              $ref: #/DiffPiece
      required:
        - RelativePath
        - FileSha1
        - CreatedAt1
        - FileSha2
        - CreatedAt2
        - IsBinary
        - InlineDiff
        - SideBySideOld
        - SideBySideNew

    DiffPiece:
      type: object
      properties:
        Position:
          type: integer
          nullable: true
        SubPieces:
          type: array
          items:
            $ref: #/DiffPiece
        Text:
          type: string
        Type:
          $ref: #/ChangeType
      required:
        - Text
        - Type

    ChangeType:
      type: integer
      enum:
        - 0
        - 1
        - 2
        - 3
        - 4
      enumNames:
        - Unchanged
        - Deleted
        - Inserted
        - Imaginary
        - Modified

    ObjectStorageProvider:
      type: string
      enum:
        - AWSS3
        - AzureBlobStorage
        - GoogleCloudStorage
        - Unknown

    RepositoryVisibility:
      type: string
      enum:
        - Private
        - Public

    RepositoryStatus:
      type: string
      enum:
        - Active
        - Suspended
        - Closed
        - Deleted
