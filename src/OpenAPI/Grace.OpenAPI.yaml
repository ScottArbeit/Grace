                        Principal:
                          type: string
                    - type: object
                      properties:
                        BranchId:
                          type: string
                          format: uuid
                          example: de7bf47d-23ae-4599-af68-68a317ea390d
                        BranchName:
                          type: string
                          example: MyBranch
                        OwnerId:
                          type: string
                          format: uuid
