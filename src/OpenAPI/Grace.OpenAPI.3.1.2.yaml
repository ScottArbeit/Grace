      description: Compatibility endpoint for downloading repository-scoped WholeFileContent.
      operationId: GetDownloadUri
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetDownloadUriParameters'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/UriString'
              examples:
                signedDownloadUri:
                  summary: Raw object-storage download URI
                  value: https://storage.example.net/grace/repo/file.txt?sv=2023-11-03&sig=example
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/getContentBlockUploadUri:
    post:
      summary: Gets an upload URI for a ContentBlock payload.
      description: Gets an object-storage upload URI without probing whether the ContentBlock already exists.
      operationId: GetContentBlockUploadUri
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetContentBlockUploadUriParameters'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/UriString'
              examples:
                signedContentBlockUploadUri:
                  summary: Raw ContentBlock upload URI
                  value: https://storage.example.net/grace/staging/repositories/ab6f35ef-6e01-440b-8f9b-c343a5272095/upload-sessions/6a67b2a9f6fb45c6a7f89ce5f39f2e14/content-blocks/abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789?sv=2023-11-03&sig=example#graceStorageAccount=gracestaging001
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/getContentBlockDownloadUri:
    post:
      summary: Gets a download URI for a ContentBlock payload.
      description: Gets an object-storage download URI for one ContentBlock in an authorized manifest-backed reconstruction path. Callers provide the server-accepted StoragePoolId, ManifestAddress, ContentBlockAddress, and AuthorizedScope; the request does not repost the full FileManifest for each block.
      operationId: GetContentBlockDownloadUri
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetContentBlockDownloadUriParameters'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/UriString'
              examples:
                signedContentBlockDownloadUri:
                  summary: Raw ContentBlock download URI
                  value: https://privatelink.storage.example.net/grace/cas/content/ab/cd/ef/01/abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789?sv=2023-11-03&sig=example#graceStorageAccount=casdownload001
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/discoverContentBlocks:
    post:
      summary: Discovers reusable ContentBlock candidates.
      description: Returns bounded, non-authoritative candidate windows for key chunks; empty results do not prove absence.
      operationId: DiscoverContentBlocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverContentBlocksParameters'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverContentBlocksReturnValue'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/startManifestUploadSession:
    post:
      summary: Starts a manifest upload session.
      description: Starts the server-authoritative workflow for one manifest-backed file.
      operationId: StartManifestUploadSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartManifestUploadSessionParameters'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionDecisionReturnValue'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/issueDedupeDiscovery:
    post:
      summary: Issues upload-session dedupe discovery hints.
      description: Records server-issued discovery hints for a started upload session before reuse claims.
      operationId: IssueDedupeDiscovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueDedupeDiscoveryParameters'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionDecisionReturnValue'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/claimReuseRanges:
    post:
      summary: Claims reusable ContentBlock ranges.
      description: Claims server-issued candidate ranges after authoritative ContentBlockMetadata validation.
      operationId: ClaimReuseRanges
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimReuseRangesParameters'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionDecisionReturnValue'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/registerContentBlockUpload:
    post:
      summary: Registers a ContentBlock upload intent.
      description: Records the expected logical range and payload size before uploading a new ContentBlock.
      operationId: RegisterContentBlockUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterContentBlockUploadParameters'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionDecisionReturnValue'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/confirmContentBlockUpload:
    post:
      summary: Confirms a ContentBlock upload.
      description: Confirms object-storage placement for a ContentBlock that was uploaded for this manifest session.
      operationId: ConfirmContentBlockUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmContentBlockUploadParameters'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionDecisionReturnValue'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /storage/finalizeManifestUpload:
    post:
      summary: Finalizes a manifest upload.
      description: Finalizes the manifest after validating reconstruction, range claims, block presence, file hash, and size.
      operationId: FinalizeManifestUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeManifestUploadParameters'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionDecisionReturnValue'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
