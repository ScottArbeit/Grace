        - Size
    ContentBlockAddress:
      description: Lowercase 64-character BLAKE3-derived ContentBlock address.
      type: string
      pattern: ^[a-f0-9]{64}$
    ManifestAddress:
      description: Lowercase 64-character BLAKE3-derived FileManifest address.
      type: string
      pattern: ^[a-f0-9]{64}$
    FileContentHash:
      description: Lowercase 64-character BLAKE3 hash of the complete unencoded file bytes.
      type: string
      pattern: ^[a-f0-9]{64}$
    ChunkAddress:
      description: Lowercase 64-character BLAKE3 chunk address.
      type: string
      pattern: ^[a-f0-9]{64}$
    StoragePoolId:
      description: StoragePool-wide CAS scope identifier. Public clients treat this as server-provided placement evidence and must not use it to select storage accounts, containers, buckets, prefixes, or write authority directly.
      type: string
    ChunkingSuiteId:
      description: Versioned chunking suite identifier.
      type: string
      example: rabin-v1
    UploadSessionOperationId:
      description: Caller-supplied idempotency key for one upload-session operation.
      type: string
    Instant:
      type: string
      format: date-time
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence of the problem.
      required:
        - type
        - title
        - status
        - detail
        - instance
