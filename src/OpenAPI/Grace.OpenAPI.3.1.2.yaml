      example: manifest-finalized
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-Key
      in: header
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GraceError'
          examples:
            domainValidation:
              summary: Grace domain validation error
              value:
                Error: OwnerId is required.
                EventTime: '2026-06-04T18:15:00Z'
                CorrelationId: cli-20260604T181500Z-0001
                Properties:
                  Path: /owner/get
    '401':
      description: Unauthorized
      headers:
        WWW-Authenticate:
          description: Authentication challenge emitted by the configured ASP.NET Core authentication handler.
          schema:
            type: string
          example: Bearer
      content:
        text/plain:
          schema:
            type: string
          examples:
            emptyChallenge:
              summary: Framework authentication challenge
              value: ''
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GraceError'
          examples:
            domainException:
