              type: integer
              format: int32
              minimum: 1
              example: 50
    GetDiffsForReferencesParameters:
      description: Parameters for the /branch/getDiffsForReferences endpoint.
      allOf:
        - $ref: '#/components/schemas/BranchParameters'
        - type: object
          properties:
            References:
              type: string
              description: Comma-separated reference identifiers for diff lookup.
            MaxCount:
              type: integer
              format: int32
              minimum: 1
              example: 50
    GetBranchParameters:
      description: Parameters for the /branch/get endpoint.
      allOf:
        - $ref: '#/components/schemas/BranchQueryParameters'
        - type: object
          properties:
            IncludeDeleted:
              type: boolean
              example: false
    SwitchParameters:
      description: Parameters for the /branch/switch endpoint.
      allOf:
        - $ref: '#/components/schemas/BranchHashQueryParameters'
    GetBranchVersionParameters:
      description: Parameters for the /branch/getVersion endpoint.
      allOf:
        - $ref: '#/components/schemas/BranchHashQueryParameters'
        - type: object
          properties:
            IncludeDeleted:
              type: boolean
              example: false
    DiffParameters:
      description: Parameters shared by public endpoints in the /diff route family.
      type: object
      allOf:
        - $ref: '#/components/schemas/CommonParameters'
      properties:
        OwnerId:
          $ref: '#/components/schemas/OwnerId'
        OwnerName:
          $ref: '#/components/schemas/OwnerName'
        OrganizationId:
          $ref: '#/components/schemas/OrganizationId'
        OrganizationName:
          $ref: '#/components/schemas/OrganizationName'
        RepositoryId:
          $ref: '#/components/schemas/RepositoryId'
        RepositoryName:
          $ref: '#/components/schemas/RepositoryName'
        DirectoryVersionId1:
          type: string
          format: uuid
          example: 33a4e36b-828f-4fae-9343-50b6560dc842
        DirectoryVersionId2:
          type: string
          format: uuid
          example: 66b7b8c2-8d2f-4f04-951c-6b3486c4e5d1
    PopulateParameters:
      description: Parameters for diff population.
      allOf:
        - $ref: '#/components/schemas/DiffParameters'
    GetDiffParameters:
      description: Parameters for retrieving a diff.
      allOf:
        - $ref: '#/components/schemas/DiffParameters'
    GetDiffByReferenceTypeParameters:
      description: Parameters for retrieving a diff by reference type.
      allOf:
        - $ref: '#/components/schemas/DiffParameters'
        - type: object
          properties:
            BranchId:
              $ref: '#/components/schemas/BranchId'
            BranchName:
              $ref: '#/components/schemas/BranchName'
    GetDiffBySha256HashParameters:
      description: Parameters for retrieving a diff by SHA-256 hash or unique SHA-256 prefix.
      allOf:
        - $ref: '#/components/schemas/DiffParameters'
        - type: object
          properties:
            Sha256Hash1:
              $ref: '#/components/schemas/Sha256HashPrefix'
            Sha256Hash2:
