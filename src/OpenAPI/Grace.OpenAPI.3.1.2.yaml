      description: Body DTO correlation id copied into Grace command/event metadata after request parsing. This field is distinct from the X-Correlation-Id transport header, which correlates the HTTP request/response exchange.
      example: cli-20260604T181500Z-0001
    ContainerName:
      type: string
      description: The name of the container must be a valid Grace name. (See the Grace documentation for more information.)
    DirectoryId:
      type: string
      format: uuid
      example: 33a4e36b-828f-4fae-9343-50b6560dc842
    FilePath:
      type: string
    GraceIgnoreEntry:
      type: string
    OrganizationId:
      type: string
      format: uuid
      example: e35d64a9-b990-44f5-bf02-32ad7d15630c
    OrganizationName:
      type: string
    OwnerId:
      type: string
      format: uuid
      example: 9dd5f81f-dc43-4839-9173-85d09394f30f
    OwnerName:
      type: string
    ReferenceId:
      type: string
      format: uuid
      example: c8f9bac8-d489-46c7-917f-b36b7d9efa9a
    ReferenceName:
      type: string
    ReferenceText:
      type: string
    RepositoryId:
      type: string
      format: uuid
      example: ab6f35ef-6e01-440b-8f9b-c343a5272095
    RepositoryName:
      type: string
    RelativePath:
      type: string
    Sha256Hash:
      type: string
      description: Lowercase 64-character SHA-256 version hash persisted on version DTOs.
      pattern: ^[a-f0-9]{64}$
      example: 805331a98813206270e35564769e8bb59eea02aeb7b27c7d6c63e625e1857243
    Blake3Hash:
      type: string
      description: Lowercase 64-character BLAKE3 version hash persisted on new version graph DTOs.
      pattern: ^[a-f0-9]{64}$
      example: 9a35d91b2f631be9025de753139b88f7b1e71385c412bc3986ff2f38f230841d
