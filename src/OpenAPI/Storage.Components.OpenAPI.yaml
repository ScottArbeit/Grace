StorageParameters:
  description: Parameters common to storage endpoints.
  allOf:
    - $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/CommonParameters'
  type: object
  properties:
    OwnerId:
      type: string
    OwnerName:
      type: string
    OrganizationId:
      type: string
    OrganizationName:
      type: string
    RepositoryId:
      type: string
    RepositoryName:
      type: string

GetUploadMetadataForFilesParameters:
  description: Parameters for /storage/getUploadMetadataForFiles.
  allOf:
    - $ref: '#/StorageParameters'
  type: object
  properties:
    FileVersions:
      type: array
      items:
        $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/FileVersion'

GetUploadUriParameters:
  description: Parameters for /storage/getUploadUri.
  allOf:
    - $ref: '#/StorageParameters'
  type: object
  properties:
    FileVersions:
      type: array
      items:
        $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/FileVersion'

UploadUriMap:
  description: Upload URI response keyed by file relative path for whole-file compatibility uploads.
  type: object
  additionalProperties:
    $ref: '#/UriString'

UriString:
  description: Absolute URI string.
  type: string
  format: uri

GetDownloadUriParameters:
  description: >
    Parameters for /storage/getDownloadUri. The request identifies an observable reference, file path, and file hash
    proof; the server derives the FileVersion from that reachable reference tree before issuing a read-only object SAS.
    Supplying a FileVersion body is not accepted as authorization. At least one of Sha256Hash or Blake3Hash is required;
    the server enforces that proof requirement as request validation.
  allOf:
    - $ref: '#/StorageParameters'
  type: object
  if:
    not:
      required:
        - Sha256Hash
  then:
    required:
      - Blake3Hash
  x-grace-required-one-of:
    - Sha256Hash
    - Blake3Hash
  properties:
    ReferenceId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/ReferenceId'
    RelativePath:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RelativePath'
    Sha256Hash:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Sha256Hash'
    Blake3Hash:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Blake3Hash'
  required:
    - ReferenceId
    - RelativePath

GetContentBlockUploadUriParameters:
  description: Parameters for /storage/getContentBlockUploadUri.
  allOf:
    - $ref: '#/StorageParameters'
  type: object
  properties:
    UploadSessionId:
      type: string
      format: uuid
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    AuthorizedScope:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RelativePath'

GetContentBlockDownloadUriParameters:
  description: >-
    Parameters for /storage/getContentBlockDownloadUri. The request identifies an observable reference, authorized file
    path, file hash proof, server-accepted StoragePoolId and ManifestAddress, and one ContentBlockAddress for an
    authorized manifest-backed reconstruction path. It must not embed the full FileManifest for every block request, and
    raw content block or manifest addresses are not accepted as authorization by themselves. At least one of Sha256Hash or
    Blake3Hash is required; the server enforces that proof requirement as request validation.
  allOf:
    - $ref: '#/StorageParameters'
  type: object
  if:
    not:
      required:
        - Sha256Hash
  then:
    required:
      - Blake3Hash
  x-grace-required-one-of:
    - Sha256Hash
    - Blake3Hash
  properties:
    ReferenceId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/ReferenceId'
    AuthorizedScope:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RelativePath'
    Sha256Hash:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Sha256Hash'
    Blake3Hash:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Blake3Hash'
    StoragePoolId:
      $ref: '#/StoragePoolId'
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    ManifestAddress:
      $ref: '#/ManifestAddress'
  required:
    - ReferenceId
    - AuthorizedScope
    - StoragePoolId
    - ContentBlockAddress
    - ManifestAddress

DiscoverContentBlocksParameters:
  description: >-
    Parameters for /storage/discoverContentBlocks. Discovery is bounded and non-authoritative; empty results do not
    prove that chunks or future ContentBlocks are absent.
  allOf:
    - $ref: '#/StorageParameters'
  type: object
  properties:
    KeyChunkAddresses:
      type: array
      maxItems: 256
      items:
        $ref: '#/ChunkAddress'

UploadSessionStorageParameters:
  description: Parameters common to manifest upload-session endpoints.
  allOf:
    - $ref: '#/StorageParameters'
  type: object
  properties:
    UploadSessionId:
      type: string
      format: uuid
    AuthorizedScope:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RelativePath'

StartManifestUploadSessionParameters:
  description: Parameters for /storage/startManifestUploadSession.
  allOf:
    - $ref: '#/UploadSessionStorageParameters'
  type: object
  properties:
    FileContentHash:
      $ref: '#/FileContentHash'
    ExpectedSize:
      type: integer
      format: int64
    ChunkingSuiteId:
      $ref: '#/ChunkingSuiteId'
    SamplingPolicySnapshot:
      type: string
    OperationId:
      $ref: '#/UploadSessionOperationId'

StartUploadSession:
  description: Event payload recorded when a manifest upload session starts.
  type: object
  properties:
    UploadSessionId:
      type: string
      format: uuid
    OwnerId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/OwnerId'
    OrganizationId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/OrganizationId'
    RepositoryId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RepositoryId'
    StoragePoolId:
      $ref: '#/StoragePoolId'
    AuthorizedScope:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RelativePath'
    FileContentHash:
      $ref: '#/FileContentHash'
    ExpectedSize:
      type: integer
      format: int64
    ChunkingSuiteId:
      $ref: '#/ChunkingSuiteId'
    SamplingPolicySnapshot:
      type: string
    OperationId:
      $ref: '#/UploadSessionOperationId'
  required:
    - UploadSessionId
    - OwnerId
    - OrganizationId
    - RepositoryId
    - StoragePoolId
    - AuthorizedScope
    - FileContentHash
    - ExpectedSize
    - ChunkingSuiteId
    - SamplingPolicySnapshot
    - OperationId

IssueDedupeDiscoveryParameters:
  description: Parameters for /storage/issueDedupeDiscovery.
  allOf:
    - $ref: '#/UploadSessionStorageParameters'
  type: object
  properties:
    OperationId:
      $ref: '#/UploadSessionOperationId'
    ExpiresAt:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    MinimumReuseRunLength:
      type: integer
      minimum: 1
    KeyChunkAddresses:
      type: array
      maxItems: 256
      items:
        $ref: '#/ChunkAddress'
    Hints:
      type: array
      maxItems: 1024
      items:
        $ref: '#/ContentBlockReuseRangeHint'

ClaimReuseRangesParameters:
  description: Parameters for /storage/claimReuseRanges.
  allOf:
    - $ref: '#/UploadSessionStorageParameters'
  type: object
  properties:
    OperationId:
      $ref: '#/UploadSessionOperationId'
    DiscoveryOperationId:
      $ref: '#/UploadSessionOperationId'
    Hints:
      type: array
      maxItems: 1024
      items:
        $ref: '#/ContentBlockReuseRangeHint'

RegisterContentBlockUploadParameters:
  description: Parameters for /storage/registerContentBlockUpload.
  allOf:
    - $ref: '#/UploadSessionStorageParameters'
  type: object
  properties:
    OperationId:
      $ref: '#/UploadSessionOperationId'
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    LogicalOffset:
      type: integer
      format: int64
    LogicalLength:
      type: integer
      format: int64
    ExpectedPayloadLength:
      type: integer
      format: int64

ConfirmContentBlockUploadParameters:
  description: Parameters for /storage/confirmContentBlockUpload.
  allOf:
    - $ref: '#/UploadSessionStorageParameters'
  type: object
  properties:
    OperationId:
      $ref: '#/UploadSessionOperationId'
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    Payload:
      type: string
      format: byte
    StoragePlacement:
      $ref: '#/ContentBlockStoragePlacement'

FinalizeManifestUploadParameters:
  description: Parameters for /storage/finalizeManifestUpload.
  allOf:
    - $ref: '#/UploadSessionStorageParameters'
  type: object
  properties:
    OperationId:
      $ref: '#/UploadSessionOperationId'
    Manifest:
      $ref: '#/FileManifest'
    BlockPayloads:
      type: array
      items:
        $ref: '#/FinalizeManifestBlockPayload'

ContentBlockDiscoveryPolicy:
  description: Bounded, non-authoritative discovery policy returned by /storage/discoverContentBlocks.
  type: object
  properties:
    MaxKeyChunkAddresses:
      type: integer
      example: 256
    MaxCandidateWindowsPerKeyChunk:
      type: integer
      example: 4
    MaxWindowChunks:
      type: integer
      example: 256
    MaxResponseProtectedChunks:
      type: integer
      example: 16384
    ResponseTtlSeconds:
      type: integer
      example: 300
    MinimumAcceptedReuseRunLength:
      type: integer
      example: 8
    PositiveCandidatesEnabled:
      type: boolean
    EmptyResponseMeansAbsent:
      type: boolean
      example: false
    IsAuthoritative:
      type: boolean
      example: false

ContentBlockDiscoveryCandidate:
  description: A bounded, response-protected candidate window for possible ContentBlock reuse.
  type: object
  properties:
    StoragePoolId:
      $ref: '#/StoragePoolId'
    ManifestAddress:
      $ref: '#/ManifestAddress'
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    OrdinalStart:
      type: integer
    OrdinalCount:
      type: integer
    MetadataVersion:
      type: integer
      format: int64
    MatchingKeyChunkCount:
      type: integer
    ProtectedChunkAddresses:
      type: array
      items:
        type: string

DiscoverContentBlocksResult:
  description: Non-authoritative ContentBlock discovery result.
  type: object
  properties:
    RequestedKeyChunkCount:
      type: integer
    AcceptedKeyChunkCount:
      type: integer
    Policy:
      $ref: '#/ContentBlockDiscoveryPolicy'
    CandidateContentBlocks:
      type: array
      items:
        $ref: '#/ContentBlockDiscoveryCandidate'
    IsPartial:
      type: boolean
    Message:
      type: string

GraceReturnValueBase:
  description: Common metadata returned with successful Grace responses.
  type: object
  properties:
    EventTime:
      type: string
      format: date-time
    CorrelationId:
      type: string
    Properties:
      type: object
      additionalProperties: true
  required:
    - EventTime
    - CorrelationId
    - Properties

UploadMetadataArrayReturnValue:
  description: Successful upload metadata response for whole-file compatibility uploads.
  allOf:
    - $ref: '#/GraceReturnValueBase'
    - type: object
      properties:
        ReturnValue:
          type: array
          items:
            $ref: '#/UploadMetadata'
      required:
        - ReturnValue

UploadSessionDecisionReturnValue:
  description: Successful upload-session command response.
  allOf:
    - $ref: '#/GraceReturnValueBase'
    - type: object
      properties:
        ReturnValue:
          $ref: '#/UploadSessionDecision'
      required:
        - ReturnValue

DiscoverContentBlocksReturnValue:
  description: Successful ContentBlock discovery response.
  allOf:
    - $ref: '#/GraceReturnValueBase'
    - type: object
      properties:
        ReturnValue:
          $ref: '#/DiscoverContentBlocksResult'
      required:
        - ReturnValue

UploadMetadata:
  description: Upload metadata returned by whole-file compatibility upload planning.
  type: object
  properties:
    RelativePath:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RelativePath'
    BlobUriWithSasToken:
      type: string
      format: uri
    Sha256Hash:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Sha256Hash'
    Blake3Hash:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Blake3Hash'
    ContentReference:
      $ref: '#/FileContentReference'
  required:
    - RelativePath
    - BlobUriWithSasToken
    - Sha256Hash
    - Blake3Hash
    - ContentReference

FileContentReference:
  description: Identifies whether a FileVersion refers to whole-file bytes or a FileManifest.
  type: object
  properties:
    Class:
      type: string
      enum:
        - FileContentReference
    ReferenceType:
      type: string
      enum:
        - WholeFileContent
        - FileManifest
    Manifest:
      anyOf:
        - $ref: '#/FileManifest'
        - type: 'null'
  required:
    - Class
    - ReferenceType
    - Manifest

UploadSessionDecision:
  description: UploadSession command decision returned by manifest upload-session endpoints.
  type: object
  properties:
    Session:
      $ref: '#/UploadSessionDto'
    OperationId:
      $ref: '#/UploadSessionOperationId'
    Events:
      type: array
      items:
        $ref: '#/UploadSessionEvent'
    WasIdempotentReplay:
      type: boolean
    Message:
      type: string
  required:
    - Session
    - OperationId
    - Events
    - WasIdempotentReplay
    - Message

UploadSessionDto:
  description: Server state snapshot for a manifest upload session.
  type: object
  properties:
    Class:
      type: string
      enum:
        - UploadSessionDto
    UploadSessionId:
      type: string
      format: uuid
    OwnerId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/OwnerId'
    OrganizationId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/OrganizationId'
    RepositoryId:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RepositoryId'
    StoragePoolId:
      $ref: '#/StoragePoolId'
    AuthorizedScope:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/RelativePath'
    FileContentHash:
      $ref: '#/FileContentHash'
    ExpectedSize:
      type: integer
      format: int64
    ChunkingSuiteId:
      $ref: '#/ChunkingSuiteId'
    SamplingPolicySnapshot:
      type: string
    LifecycleState:
      $ref: '#/UploadSessionLifecycleState'
    StartedAt:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    CompletedAt:
      nullable: true
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    FinalizedManifestAddress:
      nullable: true
      $ref: '#/ManifestAddress'
    BlockUploadIntents:
      type: array
      items:
        $ref: '#/BlockUploadIntent'
    ConfirmedBlockUploads:
      type: array
      items:
        $ref: '#/ConfirmedBlockUpload'
    DedupeDiscovery:
      nullable: true
      $ref: '#/DedupeDiscoverySnapshot'
    ClaimedReuseRanges:
      type: array
      items:
        $ref: '#/ClaimedReuseRange'
    CleanupReminderScheduledAt:
      nullable: true
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    CleanupReminderOperationId:
      nullable: true
      $ref: '#/UploadSessionOperationId'
    LastOperationId:
      nullable: true
      $ref: '#/UploadSessionOperationId'
  required:
    - Class
    - UploadSessionId
    - OwnerId
    - OrganizationId
    - RepositoryId
    - StoragePoolId
    - AuthorizedScope
    - FileContentHash
    - ExpectedSize
    - ChunkingSuiteId
    - SamplingPolicySnapshot
    - LifecycleState
    - StartedAt
    - CompletedAt
    - FinalizedManifestAddress
    - BlockUploadIntents
    - ConfirmedBlockUploads
    - DedupeDiscovery
    - ClaimedReuseRanges
    - CleanupReminderScheduledAt
    - CleanupReminderOperationId
    - LastOperationId

UploadSessionLifecycleState:
  description: Lifecycle state for a manifest upload session.
  type: string
  enum:
    - NotStarted
    - Started
    - Discovering
    - UploadingBlocks
    - ClaimingRanges
    - FinalizingManifest
    - Finalized
    - Abandoned
    - Expired
    - RetentionPending
    - StateDeleted

BlockUploadIntent:
  description: Registered intent to upload a logical ContentBlock range.
  type: object
  properties:
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    LogicalOffset:
      type: integer
      format: int64
    LogicalLength:
      type: integer
      format: int64
    ExpectedPayloadLength:
      type: integer
      format: int64
    RegisteredAt:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
  required:
    - ContentBlockAddress
    - LogicalOffset
    - LogicalLength
    - ExpectedPayloadLength
    - RegisteredAt

ConfirmedBlockUpload:
  description: Confirmed object-storage placement for an uploaded ContentBlock.
  type: object
  properties:
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    PayloadLength:
      type: integer
      format: int64
    StoragePlacement:
      $ref: '#/ContentBlockStoragePlacement'
    Ranges:
      type: array
      items:
        $ref: '#/ContentBlockMetadataRange'
    ConfirmedAt:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
  required:
    - ContentBlockAddress
    - PayloadLength
    - StoragePlacement
    - Ranges
    - ConfirmedAt

DedupeDiscoverySnapshot:
  description: Server-issued dedupe discovery snapshot retained by an upload session.
  type: object
  properties:
    OperationId:
      $ref: '#/UploadSessionOperationId'
    ExpiresAt:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
    MinimumReuseRunLength:
      type: integer
    Hints:
      type: array
      items:
        $ref: '#/ContentBlockReuseRangeHint'
  required:
    - OperationId
    - ExpiresAt
    - MinimumReuseRunLength
    - Hints

ClaimedReuseRange:
  description: Reuse range accepted by the upload-session workflow.
  type: object
  properties:
    StoragePoolId:
      $ref: '#/StoragePoolId'
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    OrdinalStart:
      type: integer
    OrdinalCount:
      type: integer
    PhysicalOffset:
      type: integer
      format: int64
    PhysicalLength:
      type: integer
      format: int64
    MetadataVersion:
      type: integer
      format: int64
    ClaimedAt:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
  required:
    - StoragePoolId
    - ContentBlockAddress
    - OrdinalStart
    - OrdinalCount
    - PhysicalOffset
    - PhysicalLength
    - MetadataVersion
    - ClaimedAt

ContentBlockMetadataRange:
  description: Physical range metadata for ContentBlock reconstruction, reuse, and compaction.
  type: object
  properties:
    OrdinalStart:
      type: integer
    OrdinalCount:
      type: integer
    ActiveManifestCount:
      type: integer
    PhysicalOffset:
      type: integer
      format: int64
    PhysicalLength:
      type: integer
      format: int64
  required:
    - OrdinalStart
    - OrdinalCount
    - ActiveManifestCount
    - PhysicalOffset
    - PhysicalLength

UploadSessionEvent:
  description: Event emitted by the upload-session actor, paired with event metadata.
  type: object
  properties:
    Event:
      $ref: '#/UploadSessionEventType'
    Metadata:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/EventMetadata'
  required:
    - Event
    - Metadata

UploadSessionEventType:
  description: Upload-session event union payload. Event objects contain the fields for one emitted union case.
  oneOf:
    - $ref: '#/UploadSessionStartedEvent'
    - $ref: '#/UploadSessionOperationEvent'
    - $ref: '#/UploadSessionFinalizedEvent'
    - $ref: '#/UploadSessionCleanupReminderScheduledEvent'
    - $ref: '#/UploadSessionBlockUploadIntentRegisteredEvent'
    - $ref: '#/UploadSessionBlockUploadConfirmedEvent'
    - $ref: '#/UploadSessionDedupeDiscoveryIssuedEvent'
    - $ref: '#/UploadSessionReuseRangesClaimedEvent'

UploadSessionStartedEvent:
  type: object
  properties:
    Started:
      $ref: '#/StartUploadSession'
  required:
    - Started

UploadSessionOperationEvent:
  type: object
  description: Event cases whose payload is only an operation id.
  properties:
    EventCase:
      type: string
      enum:
        - Abandoned
        - Expired
        - PhysicalStateDeleted
    OperationId:
      $ref: '#/UploadSessionOperationId'
  required:
    - EventCase
    - OperationId

UploadSessionFinalizedEvent:
  type: object
  properties:
    Finalized:
      type: object
      properties:
        OperationId:
          $ref: '#/UploadSessionOperationId'
        ManifestAddress:
          $ref: '#/ManifestAddress'
      required:
        - OperationId
        - ManifestAddress
  required:
    - Finalized

UploadSessionCleanupReminderScheduledEvent:
  type: object
  properties:
    CleanupReminderScheduled:
      type: object
      properties:
        OperationId:
          $ref: '#/UploadSessionOperationId'
        ReminderTime:
          $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/Instant'
      required:
        - OperationId
        - ReminderTime
  required:
    - CleanupReminderScheduled

UploadSessionBlockUploadIntentRegisteredEvent:
  type: object
  properties:
    BlockUploadIntentRegistered:
      type: object
      properties:
        OperationId:
          $ref: '#/UploadSessionOperationId'
        Intent:
          $ref: '#/BlockUploadIntent'
      required:
        - OperationId
        - Intent
  required:
    - BlockUploadIntentRegistered

UploadSessionBlockUploadConfirmedEvent:
  type: object
  properties:
    BlockUploadConfirmed:
      type: object
      properties:
        OperationId:
          $ref: '#/UploadSessionOperationId'
        ConfirmedBlock:
          $ref: '#/ConfirmedBlockUpload'
      required:
        - OperationId
        - ConfirmedBlock
  required:
    - BlockUploadConfirmed

UploadSessionDedupeDiscoveryIssuedEvent:
  type: object
  properties:
    DedupeDiscoveryIssued:
      type: object
      properties:
        OperationId:
          $ref: '#/UploadSessionOperationId'
        Discovery:
          $ref: '#/DedupeDiscoverySnapshot'
      required:
        - OperationId
        - Discovery
  required:
    - DedupeDiscoveryIssued

UploadSessionReuseRangesClaimedEvent:
  type: object
  properties:
    ReuseRangesClaimed:
      type: object
      properties:
        OperationId:
          $ref: '#/UploadSessionOperationId'
        ClaimedRanges:
          type: array
          items:
            $ref: '#/ClaimedReuseRange'
      required:
        - OperationId
        - ClaimedRanges
  required:
    - ReuseRangesClaimed

ContentBlockReuseRangeHint:
  description: Server-issued hint used to claim a reusable ContentBlock range.
  type: object
  properties:
    StoragePoolId:
      $ref: '#/StoragePoolId'
    ManifestAddress:
      $ref: '#/ManifestAddress'
    ContentBlockAddress:
      $ref: '#/ContentBlockAddress'
    OrdinalStart:
      type: integer
    OrdinalCount:
      type: integer
    MetadataVersion:
      type: integer
      format: int64
    ProtectedChunkAddresses:
      type: array
      items:
        type: string

ContentBlockStoragePlacement:
  description: Object-storage placement metadata for a confirmed ContentBlock payload.
  type: object
  properties:
    StorageAccountName:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/StorageAccountName'
    StorageContainerName:
      $ref: 'Shared.Components.OpenAPI.yaml#/components/schemas/StorageContainerName'
    ObjectKey:
      type: string
    ETag:
      type: string
      nullable: true
  required:
    - StorageAccountName
    - StorageContainerName
    - ObjectKey

FinalizeManifestBlockPayload:
  description: Optional inline payload used by manifest finalization compatibility paths.
  type: object
  properties:
    Address:
      $ref: '#/ContentBlockAddress'
    Payload:
      type: string
      format: byte

FileManifest:
  description: >-
    Server-accepted reconstruction contract for one manifest-backed file. StoragePoolId is placement evidence selected
    by Grace Server, not a publication right for a client to choose physical storage shards.
  type: object
  properties:
    Class:
      type: string
      enum:
        - FileManifest
    ManifestAddress:
      $ref: '#/ManifestAddress'
    ChunkingSuiteId:
      $ref: '#/ChunkingSuiteId'
    FileContentHash:
      $ref: '#/FileContentHash'
    StoragePoolId:
      $ref: '#/StoragePoolId'
    Size:
      type: integer
      format: int64
    Blocks:
      type: array
      items:
        $ref: '#/ContentBlock'
  required:
    - Class
    - ManifestAddress
    - ChunkingSuiteId
    - FileContentHash
    - StoragePoolId
    - Size
    - Blocks

ContentBlock:
  description: Logical byte range inside a manifest-backed file.
  type: object
  properties:
    Class:
      type: string
      enum:
        - ContentBlock
    Address:
      $ref: '#/ContentBlockAddress'
    Offset:
      type: integer
      format: int64
    Size:
      type: integer
      format: int64
  required:
    - Class
    - Address
    - Offset
    - Size

ChunkAddress:
  description: Lowercase 64-character BLAKE3 chunk address.
  type: string
  pattern: '^[a-f0-9]{64}$'

ContentBlockAddress:
  description: Lowercase 64-character BLAKE3-derived ContentBlock address.
  type: string
  pattern: '^[a-f0-9]{64}$'

ManifestAddress:
  description: Lowercase 64-character BLAKE3-derived FileManifest address.
  type: string
  pattern: '^[a-f0-9]{64}$'

FileContentHash:
  description: Lowercase 64-character BLAKE3 hash of the complete unencoded file bytes.
  type: string
  pattern: '^[a-f0-9]{64}$'

StoragePoolId:
  description: >-
    StoragePool-wide CAS scope identifier. Public clients treat this as server-provided placement evidence and must not
    use it to select storage accounts, containers, buckets, prefixes, or write authorization directly.
  type: string

ChunkingSuiteId:
  description: Versioned chunking suite identifier.
  type: string
  example: rabin-v1

UploadSessionOperationId:
  description: Caller-supplied idempotency key for one upload-session operation.
  type: string
